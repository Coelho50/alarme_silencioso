services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - controle-service
      - logging-service

  controle-service:
    build: ./controle-service
    ports:
      - "8081:8081"

  logging-service:
    build: ./logging-service
    ports:
      - "8082:8082"